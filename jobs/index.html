<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/jobs.css">
    <title>TalentFlow | Jobs</title>
    <style>
      .loading {
        width: 100vw;
        height: 100dvh;
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        z-index: 2000;
        background: #393d3f;
        transition: 0.5s;
      }
      .loading.close {
        opacity: 0;
      }
      .loader {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        display: inline-block;
        border-top: 4px solid #de3163;
        border-right: 4px solid transparent;
        box-sizing: border-box;
        position: relative;
        animation: rotation 1s linear infinite;
      }
      .loader::after {
        content: "";
        box-sizing: border-box;
        position: absolute;
        left: 0;
        top: -4px;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border-bottom: 4px solid #fdfdff;
        border-left: 4px solid transparent;
      }
      .loading__img {
        width: 2.5rem;
        border-radius: 50%;
        border: 2px solid #de3163;
        position: absolute;
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        z-index: 990;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="/scripts/jobs.js" defer></script>
  </head>
  <body>
    <div class="loading">
      <div class="loader"></div>
      <img
        class="loading__img"
        src="/images/loading.webp"
        alt="page logo for loading animation"
      />
    </div>
    <div id="app">
        <header class="header">
        <div class="header__wrapper">
          <figure class="header__figure">
            <img
              src="/images/logo.webp"
              alt="logo of joab bord"
              class="header__logo"
              width="200"
            />
            <figcaption class="header__caption">TalentFlow</figcaption>
          </figure>
          <div class="menu">
            <div class="menu-icon"></div>
            <div class="menu-icon"></div>
            <div class="menu-icon"></div>
          </div>
          <nav class="header__nav">
            <ul class="header__list">
              <li class="header__item">
                <a href="/" class="header__link">Home</a>
              </li>
              <li class="header__item">
                <a href="/jobs" class="header__link active">Find Jobs</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">Post Job</a>
              </li>
              <li class="header__item">
                <a href="/about" class="header__link">About</a>
              </li>
            </ul>
          </nav>
          <div class="header__auth">
            <button class="header__btn signup">
              <a href="/auth/register">Get Started</a>
            </button>
          </div>
        </div>
      </header>
    </div>
  </body>
</html>
