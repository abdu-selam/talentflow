<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/resets.css" />
    <link rel="stylesheet" href="../../styles/register.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="../../favicon.ico" />
    <link rel="icon" href="../../favicon.png" type="image/png" />
    <title>TalentFlow | Register</title>

    <script src="../../scripts/auth.js" type="module"></script>
    <script src="../../scripts/register.js" type="module"></script>

    <style>
      .loading {
        width: 100vw;
        height: 100dvh;
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        z-index: 2000;
        background: #393d3f;
        transition: 0.5s;
      }
      .loading.close {
        opacity: 0;
      }
      .loader {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        display: inline-block;
        border-top: 4px solid #de3163;
        border-right: 4px solid transparent;
        box-sizing: border-box;
        position: relative;
        animation: rotation 1s linear infinite;
      }
      .loader::after {
        content: "";
        box-sizing: border-box;
        position: absolute;
        left: 0;
        top: -4px;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border-bottom: 4px solid #fdfdff;
        border-left: 4px solid transparent;
      }
      .loading__img {
        width: 2.5rem;
        border-radius: 50%;
        border: 2px solid #de3163;
        position: absolute;
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        z-index: 990;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="loader"></div>
      <img
        class="loading__img"
        src="../../images/loading.webp"
        alt="page logo for loading animation"
      />
    </div>
    <div id="app">
      <section class="back">
        <p class="back__text">TalentFlow</p>
        <div class="flows"></div>
        <div class="flows"></div>
        <div class="flows"></div>
      </section>
      <div class="wrapper">
        <section class="form__side">
          <figure class="form__fig">
            <img
              src="../../images/logo.webp"
              alt="logo of TalentFlow in register "
              class="form__logo"
              width="100"
            />
            <figcaption class="form__caption">
              <h1 class="form__title">TalentFlow</h1>
              <p class="form__desc">
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
              </p>
            </figcaption>
          </figure>
        </section>
        <section class="form__wrapper">
          <form class="form">
            <div class="input__wrapper">
              <label for="fname" class="form__label"> First Name </label>
              <input
                type="text"
                name="fname"
                id="fname"
                class="form__input name"
                placeholder="Your first name here..."
              />
            </div>
            <div class="input__wrapper">
              <label for="lname" class="form__label"> Last Name </label>
              <input
                type="text"
                name="lname"
                id="lname"
                class="form__input name"
                placeholder="Your last name here..."
              />
            </div>
            <div class="input__wrapper">
              <label for="email" class="form__label"> Email </label>
              <input
                type="email"
                name="email"
                id="email"
                class="form__input email"
                placeholder="Your email here..."
              />
            </div>
            <div class="input__wrapper">
              <p class="form__label">Chooce your roll</p>
              <div class="input__choice">
                <button type="button" class="choice__btn active">
                  Freelancer
                </button>
                <button type="button" class="choice__btn">Client</button>
              </div>
            </div>
            <div class="input__wrapper">
              <label for="password" class="form__label"> Password </label>
              <div class="password__wrapper">
                <input
                  autocomplete="off"
                  type="password"
                  name="password"
                  id="password"
                  class="form__input password"
                  placeholder="Your password here..."
                />
                <div class="input__eye">
                  <span class="active">
                    <img
                      src="../../images/eye-open.webp"
                      alt="eye open icon"
                      width="25"
                    />
                  </span>
                  <span>
                    <img
                      src="../../images/eye-close.webp"
                      alt="eye open icon"
                      width="25"
                    />
                  </span>
                </div>
              </div>
              <ul class="password__valid">
                <li class="valid__item upper">At least one capital letter.</li>
                <li class="valid__item lower">At least one small letter.</li>
                <li class="valid__item num">At least one number.</li>
                <li class="valid__item special">
                  At least one special character.
                </li>
                <li class="valid__item amount">At least eight in length.</li>
              </ul>
            </div>
            <button class="form__btn">
              <span class="txt active"> Register </span>
              <span class="icon active">
                <i class="fas fa-sun"></i>
              </span>
            </button>
            <p class="form__choice">
              Alrady have an account ?
              <span class="form__span">
                <a href="../login/" class="form__link">login</a>
              </span>
            </p>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>
